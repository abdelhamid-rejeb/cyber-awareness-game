<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Awareness Challenge</title>
<style>
/* ── PALETTE ──────────────────────────────────────────────────
   #ffffff  white
   #978859  gold
   #9DBCB0  sage
   #004165  navy
──────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f2f5f7;color:#004165;min-height:100vh}
#app{min-height:100vh;display:flex;flex-direction:column}
.screen{display:none}
.screen.active{display:flex;flex-direction:column}

/* ── LANGUAGE SCREEN ── */
.lang-screen{
  align-items:center;justify-content:center;min-height:100vh;gap:32px;padding:48px 24px;
  background:#ffffff;
  position:relative;overflow:hidden;
}
/* decorative corner accents */
.lang-screen::before,.lang-screen::after{
  content:'';position:absolute;border-radius:50%;opacity:.07;
}
.lang-screen::before{width:500px;height:500px;background:#9DBCB0;top:-180px;right:-160px;}
.lang-screen::after{width:360px;height:360px;background:#978859;bottom:-120px;left:-100px;}

.richemont-logo{
  font-size:11px;letter-spacing:8px;color:#978859;font-weight:700;text-transform:uppercase;
}
.game-title{
  font-size:clamp(26px,5vw,46px);font-weight:800;text-align:center;line-height:1.15;
  color:#004165;
  position:relative;
}
/* gold underline accent */
.game-title::after{
  content:'';display:block;margin:12px auto 0;
  width:60px;height:3px;border-radius:2px;
  background:linear-gradient(90deg,#978859,#9DBCB0);
}
.lang-prompt{font-size:14px;color:#6a8898;letter-spacing:.3px}
.lang-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:480px}
.lang-btn{
  padding:10px 22px;border:2px solid #004165;border-radius:6px;
  background:#ffffff;color:#004165;font-size:13px;font-weight:700;letter-spacing:2px;
  cursor:pointer;transition:all .2s;position:relative;z-index:1;
}
.lang-btn:hover{
  background:#004165;color:#ffffff;transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0,65,101,.2);
}

/* ── NAME SCREEN ── */
.name-screen{
  align-items:center;justify-content:center;min-height:100vh;gap:28px;padding:40px 24px;
  background:#f2f5f7;
}
.name-box{
  background:#ffffff;border-radius:16px;padding:44px 40px;
  display:flex;flex-direction:column;align-items:center;gap:20px;
  max-width:400px;width:100%;
  box-shadow:0 8px 40px rgba(0,65,101,.1);
  border-top:4px solid #978859;
}
.name-box h2{font-size:20px;font-weight:700;color:#004165;text-align:center;letter-spacing:.2px}
.name-input{
  width:100%;padding:13px 16px;border:2px solid #e0e8ee;border-radius:8px;
  background:#f8fafb;color:#004165;font-size:15px;outline:none;transition:border-color .2s;
}
.name-input:focus{border-color:#9DBCB0;background:#fff}
.name-input::placeholder{color:#a0b4be}
.btn-start{
  width:100%;padding:14px;background:#004165;color:#fff;border:none;border-radius:8px;
  font-size:15px;font-weight:700;letter-spacing:.8px;cursor:pointer;transition:all .2s;
}
.btn-start:hover{background:#005580;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,65,101,.3)}

/* ── GAME SCREEN ── */
.game-screen{min-height:100vh;background:#f2f5f7}
.game-header{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  padding:14px 20px;background:#ffffff;
  border-bottom:3px solid #9DBCB0;
  box-shadow:0 2px 12px rgba(0,65,101,.06);
}
.hdr-logo{font-size:11px;letter-spacing:6px;color:#978859;font-weight:700;text-transform:uppercase}
.hdr-stats{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.stat-chip{
  border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;white-space:nowrap;
  background:#f2f5f7;border:1.5px solid #d8e4ea;color:#004165;
}
.stat-chip.timer{
  color:#978859;min-width:68px;text-align:center;
  font-variant-numeric:tabular-nums;border-color:#978859;background:#fffaf4;
}
.stat-chip.score{color:#004165;border-color:#9DBCB0;background:#f4faf8}
.stat-chip.moves{color:#004165;border-color:#d0dce4;background:#f2f5f7}

.progress-bar-wrap{height:4px;background:#e8eef2}
.progress-bar{height:100%;background:linear-gradient(90deg,#978859,#9DBCB0);width:0%;transition:width .45s ease}

.game-hint{
  text-align:center;padding:10px 20px;font-size:12.5px;color:#6a8898;
  letter-spacing:.2px;
}

/* ── CARD GRID ── */
.card-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:16px;padding:16px 24px 32px;max-width:1020px;margin:0 auto;width:100%;
}
@media(max-width:700px){
  .card-grid{grid-template-columns:repeat(2,1fr);gap:12px;padding:12px 16px 24px}
}

/* ── FLIP CARD — portrait ratio ~1:1.45 ── */
.card-wrap{
  /* aspect-ratio drives the height; min ensures cards never collapse */
  aspect-ratio:5/7;
  min-height:220px;
  perspective:1000px;cursor:pointer;transition:transform .18s ease;
}
.card-wrap:not(.matched):hover{transform:translateY(-6px);filter:drop-shadow(0 10px 20px rgba(0,65,101,.18))}
@media(max-width:700px){.card-wrap{min-height:180px}}

.card-inner{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .54s cubic-bezier(.4,0,.2,1);
}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-wrap.matched .card-inner{transform:rotateY(180deg)}

.card-face{
  position:absolute;inset:0;border-radius:14px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;padding:18px 16px;overflow:hidden;
}

/* ── FACE DOWN: navy, inner border ring, prominent icon ── */
.card-front{
  justify-content:center;align-items:center;gap:16px;
  background:#004165;
  background-image:
    repeating-linear-gradient(45deg,transparent,transparent 16px,rgba(255,255,255,.035) 16px,rgba(255,255,255,.035) 17px),
    repeating-linear-gradient(-45deg,transparent,transparent 16px,rgba(255,255,255,.035) 16px,rgba(255,255,255,.035) 17px);
  box-shadow:0 6px 24px rgba(0,65,101,.22);
}
/* classic card inner-border ring */
.card-front::after{
  content:'';position:absolute;inset:10px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:8px;pointer-events:none;
}
.front-icon{font-size:52px;opacity:.65;line-height:1;color:#ffffff;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.front-label{
  font-size:11px;font-weight:800;letter-spacing:4px;text-transform:uppercase;
  padding:6px 16px;border-radius:6px;
}
.front-label.attack{
  color:#d4b060;background:rgba(200,168,80,.2);border:1.5px solid rgba(200,168,80,.55);
}
.front-label.defense{
  color:#9DBCB0;background:rgba(157,188,176,.18);border:1.5px solid rgba(157,188,176,.55);
}

/* ── FACE UP ── */
.card-back{
  transform:rotateY(180deg);
  justify-content:flex-start;gap:8px;
  background:#ffffff;
  box-shadow:0 4px 16px rgba(0,65,101,.1);
}
/* colored top bar */
.card-back::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:12px 12px 0 0;
}
.card-back.attack{border:1.5px solid #e8dfc8;}
.card-back.attack::before{background:#978859;}
.card-back.defense{border:1.5px solid #c4dbd5;}
.card-back.defense::before{background:#9DBCB0;}

.back-type{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;flex-shrink:0;margin-top:2px}
.card-back.attack .back-type{color:#978859}
.card-back.defense .back-type{color:#4a9080}

.back-text{font-size:11.5px;line-height:1.58;color:#004165;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:9;-webkit-box-orient:vertical}

/* ── MATCHED ── */
.card-wrap.matched .card-back.attack,
.card-wrap.matched .card-back.defense{
  background:#f3faf8;
  border-color:#9DBCB0;
}
.card-wrap.matched .card-back::before{background:#9DBCB0}
.card-wrap.matched .back-type{color:#2a8070!important}
.card-wrap.matched .back-text{color:#1a4a3a}

/* ── WRONG SHAKE ── */
.card-wrap.wrong{animation:shake .48s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  18%{transform:translateX(-8px)}
  36%{transform:translateX(8px)}
  54%{transform:translateX(-5px)}
  72%{transform:translateX(5px)}
}

/* ── MATCH PULSE ── */
@keyframes matchPulse{
  0%{box-shadow:0 0 0 0 rgba(157,188,176,.7)}
  70%{box-shadow:0 0 0 14px rgba(157,188,176,0)}
  100%{box-shadow:0 0 0 0 rgba(157,188,176,0)}
}
.card-wrap.just-matched{animation:matchPulse .65s ease}

/* ── RESULTS SCREEN ── */
.results-screen{
  align-items:center;justify-content:flex-start;min-height:100vh;gap:20px;
  padding:40px 24px 56px;background:#ffffff;overflow-y:auto;
}
.results-title{font-size:clamp(22px,4vw,36px);font-weight:800;color:#004165;text-align:center}
.results-title::after{
  content:'';display:block;margin:10px auto 0;
  width:50px;height:3px;border-radius:2px;
  background:linear-gradient(90deg,#978859,#9DBCB0);
}
.results-sub{font-size:17px;color:#5a7888;text-align:center}
.results-sub strong{color:#004165}
.results-rating{font-size:22px;letter-spacing:3px;color:#978859}
.results-stats{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.r-stat{
  background:#f2f5f7;border:1.5px solid #dce8ee;border-radius:12px;
  padding:18px 28px;text-align:center;min-width:106px;
}
.r-val{font-size:28px;font-weight:800;color:#004165;line-height:1}
.r-lbl{font-size:10px;color:#7a9aaa;letter-spacing:2px;margin-top:4px;text-transform:uppercase}

.review-heading{
  font-size:10px;letter-spacing:3px;color:#978859;text-transform:uppercase;margin-top:6px;
  padding-bottom:6px;border-bottom:2px solid #f0e8d8;width:100%;max-width:640px;text-align:center;
}
.pairs-list{max-width:640px;width:100%;display:flex;flex-direction:column;gap:10px}
.pair-card{
  background:#f8fafb;border:1.5px solid #e0eaee;border-radius:10px;padding:16px;
  border-left:4px solid #9DBCB0;
}
.pair-attack{font-size:11.5px;color:#7a6030;font-weight:700;margin-bottom:6px;line-height:1.55}
.pair-attack::before{content:'⚔ ';opacity:.7}
.pair-defense{font-size:11.5px;color:#2a7060;margin-bottom:6px;line-height:1.55}
.pair-defense::before{content:'🛡 ';opacity:.8}
.pair-exp{
  font-size:10.5px;color:#6a8898;font-style:italic;
  border-top:1px solid #dce8ee;padding-top:7px;margin-top:3px;line-height:1.55;
}
.btn-again{
  padding:13px 40px;background:#004165;color:#fff;border:none;border-radius:8px;
  font-size:14px;font-weight:700;letter-spacing:.8px;cursor:pointer;transition:all .2s;margin-top:8px;
}
.btn-again:hover{background:#005580;transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,65,101,.28)}
</style>

// ── STATE ─────────────────────────────────────────────────────────────────────
const S={
  lang:'EN',name:'',
  cards:[],          // [{id,type,pairId}] shuffled display order
  flipped:[],        // up to 2 card ids currently face-up (unmatched)
  matched:new Set(), // card ids that are permanently matched
  moves:0, errors:0,
  start:null, timerID:null,
  locked:false
};
const tr=()=>T[S.lang];

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;}
function fmt(ms){const s=0|ms/1000,m=0|s/60;return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

// ── LANG SCREEN ───────────────────────────────────────────────────────────────
function renderLang(){
  document.getElementById('app').innerHTML=`
  <div class="screen lang-screen active">
    <div class="richemont-logo">Richemont</div>
    <div class="game-title">${T.EN.gameTitle}</div>
    <div class="lang-prompt">${T.EN.langPrompt}</div>
    <div class="lang-grid">
      ${Object.keys(T).map(l=>`<button class="lang-btn" onclick="pickLang('${l}')">${l}</button>`).join('')}
    </div>
  </div>`;
}
function pickLang(l){S.lang=l;renderName();}

// ── NAME SCREEN ───────────────────────────────────────────────────────────────
function renderName(){
  const t=tr();
  document.getElementById('app').innerHTML=`
  <div class="screen name-screen active">
    <div class="richemont-logo">Richemont</div>
    <div class="name-box">
      <h2>${t.nameTitle}</h2>
      <input class="name-input" id="nm" type="text" placeholder="${t.namePlaceholder}" maxlength="40"/>
      <button class="btn-start" onclick="startGame()">${t.startBtn}</button>
    </div>
  </div>`;
  const inp=document.getElementById('nm');
  inp.focus();
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')startGame();});
}
function startGame(){
  const n=(document.getElementById('nm').value||'').trim();
  if(!n){document.getElementById('nm').focus();return;}
  S.name=n; S.moves=0; S.errors=0; S.flipped=[]; S.matched=new Set(); S.locked=false;
  // Build 10 cards: ids 0-4 attacks, 5-9 defenses
  S.cards=shuffle([0,1,2,3,4].map(i=>({id:i,type:'attack',pairId:i})).concat([0,1,2,3,4].map(i=>({id:i+5,type:'defense',pairId:i}))));
  S.start=Date.now();
  renderGame();
  startTimer();
}

// ── GAME SCREEN ───────────────────────────────────────────────────────────────
function startTimer(){
  clearInterval(S.timerID);
  S.timerID=setInterval(()=>{const el=document.getElementById('tmr');if(el)el.textContent=fmt(Date.now()-S.start);},500);
}
function renderGame(){
  const t=tr();
  const cardHTML=S.cards.map(c=>{
    const typeKey=c.type==='attack'?'attacksLabel':'defensesLabel';
    const icon=c.type==='attack'?'⚔':'🛡';
    const text=c.type==='attack'?t.attacks[c.pairId]:t.defenses[c.pairId];
    return `
    <div class="card-wrap" id="cw${c.id}" onclick="flipCard(${c.id})">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="front-icon">${icon}</div>
          <div class="front-label ${c.type}">${t[typeKey]}</div>
        </div>
        <div class="card-face card-back ${c.type}">
          <div class="back-type">${icon} ${t[typeKey]}</div>
          <div class="back-text">${text}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('app').innerHTML=`
  <div class="screen game-screen active">
    <div class="game-header">
      <div class="hdr-logo">Richemont</div>
      <div class="hdr-stats">
        <div class="stat-chip score" id="sc">0/5 ${t.scoreLabel}</div>
        <div class="stat-chip moves" id="mv">0 ${t.movesLabel}</div>
        <div class="stat-chip timer" id="tmr">00:00</div>
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="pb"></div></div>
    <div class="game-hint">${t.hint}</div>
    <div class="card-grid">${cardHTML}</div>
  </div>`;
}

// ── FLIP LOGIC ────────────────────────────────────────────────────────────────
function flipCard(id){
  if(S.locked)return;
  if(S.matched.has(id))return;
  if(S.flipped.includes(id))return;
  document.getElementById('cw'+id).classList.add('flipped');
  S.flipped.push(id);
  if(S.flipped.length===2){
    S.moves++;
    const mv=document.getElementById('mv');
    if(mv)mv.textContent=S.moves+' '+tr().movesLabel;
    S.locked=true;
    setTimeout(checkMatch,700);
  }
}
function checkMatch(){
  const [a,b]=S.flipped;
  const ca=S.cards.find(c=>c.id===a);
  const cb=S.cards.find(c=>c.id===b);
  const isMatch=ca.pairId===cb.pairId&&ca.type!==cb.type;
  if(isMatch){
    S.matched.add(a);S.matched.add(b);
    const wa=document.getElementById('cw'+a);
    const wb=document.getElementById('cw'+b);
    wa.classList.add('matched','just-matched');
    wb.classList.add('matched','just-matched');
    setTimeout(()=>{wa.classList.remove('just-matched');wb.classList.remove('just-matched');},700);
    S.flipped=[];S.locked=false;
    const pairs=S.matched.size/2;
    const sc=document.getElementById('sc');
    if(sc)sc.textContent=pairs+'/5 '+tr().scoreLabel;
    const pb=document.getElementById('pb');
    if(pb)pb.style.width=(pairs/5*100)+'%';
    if(S.matched.size===10){clearInterval(S.timerID);setTimeout(renderResults,900);}
  } else {
    S.errors++;
    const wa=document.getElementById('cw'+a);
    const wb=document.getElementById('cw'+b);
    wa.classList.add('wrong');wb.classList.add('wrong');
    setTimeout(()=>{
      wa.classList.remove('flipped','wrong');
      wb.classList.remove('flipped','wrong');
      S.flipped=[];S.locked=false;
    },900);
  }
}

// ── RESULTS SCREEN ────────────────────────────────────────────────────────────
function renderResults(){
  const t=tr();
  const elapsed=fmt(Date.now()-S.start);
  const rating=S.errors===0?t.ratingLabels[0]:S.errors<=3?t.ratingLabels[1]:t.ratingLabels[2];
  const pairs=[0,1,2,3,4].map(i=>`
    <div class="pair-card">
      <div class="pair-attack">⚔ ${t.attacks[i]}</div>
      <div class="pair-defense">🛡 ${t.defenses[i]}</div>
      <div class="pair-exp">💡 ${t.explanations[i]}</div>
    </div>`).join('');
  document.getElementById('app').innerHTML=`
  <div class="screen results-screen active">
    <div class="richemont-logo">Richemont</div>
    <div class="results-title">🎉 ${t.completedTitle}</div>
    <div class="results-sub">${t.wellDone} <strong>${S.name}</strong></div>
    <div class="results-rating">${rating}</div>
    <div class="results-stats">
      <div class="r-stat"><div class="r-val">5/5</div><div class="r-lbl">${t.scoreLabel}</div></div>
      <div class="r-stat"><div class="r-val">${elapsed}</div><div class="r-lbl">${t.timeLbl}</div></div>
      <div class="r-stat"><div class="r-val">${S.moves}</div><div class="r-lbl">${t.movesLbl}</div></div>
      <div class="r-stat"><div class="r-val">${S.errors}</div><div class="r-lbl">${t.errorsLbl}</div></div>
    </div>
    <div class="review-heading">${t.reviewHeading}</div>
    <div class="pairs-list">${pairs}</div>
    <button class="btn-again" onclick="reset()">${t.playAgain}</button>
  </div>`;
}
function reset(){clearInterval(S.timerID);renderLang();}

// ── BOOT ──────────────────────────────────────────────────────────────────────
renderLang();
</script>
